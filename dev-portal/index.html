<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CDC Open Viz - Dev Portal</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        display: flex;
        background: #1e1e2e;
        color: #cdd6f4;
      }

      /* Sidebar styles (adapted from devTemplate/sidebar.css) */
      .dev-sidebar {
        width: 240px;
        height: 100vh;
        background: #1e1e2e;
        border-right: 1px solid #313244;
        font-size: 12px;
        overflow-y: auto;
        flex-shrink: 0;
      }
      .dev-sidebar-header {
        padding: 10px 12px;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #9399b2;
        border-bottom: 1px solid #313244;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .dev-sidebar-editor-toggle {
        background: none;
        border: 1px solid #45475a;
        border-radius: 4px;
        color: #9399b2;
        cursor: pointer;
        width: 22px;
        height: 22px;
        font-size: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s;
        padding-bottom: 2px;
      }
      .dev-sidebar-editor-toggle:hover {
        border-color: #89b4fa;
        color: #89b4fa;
      }
      .dev-sidebar-editor-toggle.active {
        background: #89b4fa;
        border-color: #89b4fa;
        color: #1e1e2e;
      }
      .dev-sidebar-search {
        padding: 8px 12px;
        border-bottom: 1px solid #313244;
      }
      .dev-sidebar-search input {
        width: 100%;
        padding: 6px 10px;
        background: #313244;
        border: 1px solid #45475a;
        border-radius: 4px;
        color: #cdd6f4;
        font-size: 12px;
        outline: none;
      }
      .dev-sidebar-search input::placeholder {
        color: #6c7086;
      }
      .dev-sidebar-search input:focus {
        border-color: #89b4fa;
      }
      .dev-sidebar-tree {
        padding: 4px 0;
      }
      .dev-sidebar-item {
        display: block;
        width: 100%;
        padding: 3px 12px;
        background: none;
        border: none;
        color: #cdd6f4;
        text-align: left;
        cursor: pointer;
        font-size: 12px;
        text-decoration: none;
      }
      .dev-sidebar-item:hover {
        background: #313244;
      }
      .dev-sidebar-item.active {
        background: #45475a;
        color: #89b4fa;
      }
      .dev-sidebar-folder {
        padding: 4px 12px;
        color: #f9e2af;
        font-size: 12px;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 5px;
        cursor: pointer;
      }
      .dev-sidebar-folder:hover {
        color: #f5c211;
      }
      .dev-sidebar-folder::before {
        content: '▶';
        font-size: 8px;
        transition: transform 0.15s;
      }
      .dev-sidebar-folder.open::before {
        transform: rotate(90deg);
      }
      .dev-sidebar-folder-contents {
        display: none;
        padding-left: 12px;
      }
      .dev-sidebar-folder.open + .dev-sidebar-folder-contents {
        display: block;
      }
      /* Package-level folders - same color, just slightly more padding */
      .dev-sidebar-package {
        padding: 6px 12px;
        margin-top: 4px;
      }
      .dev-sidebar-offline {
        opacity: 0.4;
        cursor: default;
      }
      .dev-sidebar-offline::before {
        content: '○';
        font-size: 10px;
      }

      /* Main content area */
      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: #fff;
      }
      iframe {
        flex: 1;
        border: none;
        background: #fff;
      }
      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: #666;
        font-size: 1rem;
        background: #f5f5f5;
      }
    </style>
  </head>
  <body>
    <nav class="dev-sidebar">
      <div class="dev-sidebar-header">
        <span>All Packages</span>
        <button class="dev-sidebar-editor-toggle" id="dev-editor-toggle" title="Toggle Editor">⚙</button>
      </div>
      <div class="dev-sidebar-search">
        <input type="text" id="dev-sidebar-search-input" placeholder="Search examples..." />
      </div>
      <div class="dev-sidebar-tree" id="sidebar-tree">
        <div class="loading" style="padding: 12px; background: none; color: #6c7086; font-size: 12px">
          Loading examples...
        </div>
      </div>
    </nav>
    <main class="main">
      <div class="loading">Waiting for chart package...</div>
    </main>

    <script>
      const packages = {
        chart: 3001,
        dashboard: 3003,
        'data-bite': 3004,
        'data-table': 3005,
        'filtered-text': 3007,
        map: 3008,
        'markup-include': 3009,
        'waffle-chart': 3010
      }

      const DEFAULT_PACKAGE = 'chart'
      const DEFAULT_CONFIG = '/examples/default.json'

      const main = document.querySelector('.main')
      const sidebarTree = document.getElementById('sidebar-tree')

      // Check for URL params (for shareable links and browser navigation)
      const portalParams = new URLSearchParams(window.location.search)
      let editorMode = portalParams.get('editor') === 'true'
      const urlPackage = portalParams.get('package')
      const urlConfig = portalParams.get('config')

      // Set initial editor toggle state
      const editorToggle = document.getElementById('dev-editor-toggle')
      if (editorMode) {
        editorToggle.classList.add('active')
      }

      // State (no localStorage - always starts fresh)
      let currentSelection = null
      // Expand the package from URL, or default to chart
      let expandedFolders = { [urlPackage || DEFAULT_PACKAGE]: true }
      let packageStatus = {} // Track which packages are online/offline
      let packageData = {} // Cache fetched examples data

      // Update URL to reflect current selection (for shareable links)
      function updateUrl(packageName, configPath) {
        const url = new URL(window.location)
        const isDefault = packageName === DEFAULT_PACKAGE && configPath === DEFAULT_CONFIG

        if (isDefault) {
          // Keep URL clean for default selection
          url.searchParams.delete('package')
          url.searchParams.delete('config')
        } else {
          url.searchParams.set('package', packageName)
          url.searchParams.set('config', configPath)
        }
        // Keep editor param if present
        if (editorMode) {
          url.searchParams.set('editor', 'true')
        }
        // Replace encoded slashes with real slashes for readability
        history.pushState({ packageName, configPath }, '', url.toString().replace(/%2F/g, '/'))
      }

      // Load iframe with package and config
      function loadConfig(packageName, configPath, skipUrlUpdate = false) {
        const port = packages[packageName]
        const editorParam = editorMode ? '&editor=true' : ''
        main.innerHTML = `<iframe src="http://localhost:${port}?config=${configPath}&sidebar=false${editorParam}"></iframe>`

        currentSelection = { packageName, configPath }

        // Expand the package folder
        expandedFolders[packageName] = true

        // Expand all parent directories containing this config
        // e.g., /examples/foo/bar/baz/file.json -> expand all parent paths
        const pathWithinExamples = configPath.replace('/examples/', '')
        const parts = pathWithinExamples.split('/')
        if (parts.length > 1) {
          // Build up path progressively and expand each directory level
          let currentPath = '/examples/'
          for (let i = 0; i < parts.length - 1; i++) {
            currentPath += parts[i] + '/'
            expandedFolders[`${packageName}:${currentPath}`] = true
          }
        }

        // Update URL for shareable links (skip during popstate handling)
        if (!skipUrlUpdate) {
          updateUrl(packageName, configPath)
        }

        // Update active state in sidebar
        rebuildSidebar()
      }

      // Toggle folder
      function toggleFolder(folderId, folder, packageName = null) {
        const wasOpen = folder.classList.contains('open')
        folder.classList.toggle('open')
        expandedFolders[folderId] = folder.classList.contains('open')

        // If opening a package folder, auto-select default.json
        if (!wasOpen && packageName && packageStatus[packageName]) {
          loadConfig(packageName, '/examples/default.json')
        }
      }

      const caseInsensitiveSort = (a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' })

      // Build a recursive tree structure for arbitrary nesting depth
      function buildTree(files) {
        const tree = { files: [], dirs: {} }
        files.forEach(file => {
          const parts = file.split('/')
          if (parts.length === 1) {
            tree.files.push(file)
          } else {
            const dir = parts[0]
            if (!tree.dirs[dir]) tree.dirs[dir] = []
            tree.dirs[dir].push(parts.slice(1).join('/'))
          }
        })
        // Recursively build subtrees for each directory
        Object.keys(tree.dirs).forEach(dir => {
          tree.dirs[dir] = buildTree(tree.dirs[dir])
        })
        return tree
      }

      // Recursive function to render tree at any depth
      function renderPackageTree(packageName, node, pathPrefix) {
        let html = ''

        // Render files at this level
        node.files.sort(caseInsensitiveSort).forEach(file => {
          const configPath = pathPrefix + file
          const isActive = currentSelection?.packageName === packageName && currentSelection?.configPath === configPath
          html += `<button class="dev-sidebar-item${
            isActive ? ' active' : ''
          }" data-package="${packageName}" data-config="${configPath}">${file}</button>`
        })

        // Render subdirectories recursively
        Object.keys(node.dirs)
          .sort(caseInsensitiveSort)
          .forEach(dir => {
            const dirPath = pathPrefix + dir + '/'
            const folderId = `${packageName}:${dirPath}`
            const isOpen = expandedFolders[folderId] ? ' open' : ''
            html += `<div class="dev-sidebar-folder${isOpen}" data-folder-id="${folderId}">${dir}</div>`
            html += `<div class="dev-sidebar-folder-contents">`
            html += renderPackageTree(packageName, node.dirs[dir], dirPath)
            html += '</div>'
          })

        return html
      }

      // Render a single package in the sidebar
      function renderPackage(packageName, isOnline, examples = null) {
        const folderId = packageName
        const isOpen = expandedFolders[folderId] ? ' open' : ''

        if (isOnline && examples) {
          const tree = buildTree(examples)
          let html = `<div class="dev-sidebar-folder dev-sidebar-package${isOpen}" data-folder-id="${folderId}" data-package="${packageName}">${packageName}</div>`
          html += `<div class="dev-sidebar-folder-contents">`
          html += renderPackageTree(packageName, tree, '/examples/')
          html += '</div>'
          return html
        } else {
          return `<div class="dev-sidebar-folder dev-sidebar-package dev-sidebar-offline" data-folder-id="${folderId}" data-package="${packageName}">${packageName}</div>`
        }
      }

      // Attach event handlers to sidebar elements
      function attachHandlers() {
        // Click handlers for files
        sidebarTree.querySelectorAll('.dev-sidebar-item').forEach(btn => {
          btn.addEventListener('click', () => {
            loadConfig(btn.dataset.package, btn.dataset.config)
          })
        })

        // Click handlers for folders
        sidebarTree.querySelectorAll('.dev-sidebar-folder:not(.dev-sidebar-offline)').forEach(folder => {
          folder.addEventListener('click', () => {
            const packageName = folder.classList.contains('dev-sidebar-package') ? folder.dataset.package : null
            toggleFolder(folder.dataset.folderId, folder, packageName)
          })
        })
      }

      // Search functionality
      const searchInput = document.getElementById('dev-sidebar-search-input')

      function applySearchFilter() {
        const query = searchInput.value.toLowerCase()
        const items = sidebarTree.querySelectorAll('.dev-sidebar-item')
        const folders = sidebarTree.querySelectorAll('.dev-sidebar-folder:not(.dev-sidebar-package)')
        const packageFolders = sidebarTree.querySelectorAll('.dev-sidebar-package')

        if (!query) {
          // Reset: show all items, collapse folders (except those with active item or expanded)
          items.forEach(item => (item.style.display = ''))
          folders.forEach(folder => {
            folder.style.display = ''
            const folderId = folder.dataset.folderId
            if (!expandedFolders[folderId]) {
              folder.classList.remove('open')
            }
          })
          packageFolders.forEach(pkg => {
            pkg.style.display = ''
            const folderId = pkg.dataset.folderId
            if (!expandedFolders[folderId]) {
              pkg.classList.remove('open')
            }
          })
          return
        }

        // Split query into tokens - all must match (in any order)
        const tokens = query.split(/\s+/).filter(t => t)
        const matchesAllTokens = text => tokens.every(token => text.includes(token))

        // First pass: find packages and folders that match the query
        const matchingPackages = new Set()
        const matchingFolderIds = new Set()

        packageFolders.forEach(pkg => {
          const pkgName = pkg.dataset.package.toLowerCase()
          if (matchesAllTokens(pkgName)) {
            matchingPackages.add(pkg.dataset.package)
          }
        })

        folders.forEach(folder => {
          const folderName = folder.textContent.toLowerCase()
          if (matchesAllTokens(folderName)) {
            matchingFolderIds.add(folder.dataset.folderId)
          }
        })

        // Filter items: show if item matches OR is inside a matching package/folder
        items.forEach(item => {
          const packageName = item.dataset.package
          const configPath = item.dataset.config
          const itemMatches = matchesAllTokens(item.textContent.toLowerCase())
          const inMatchingPackage = matchingPackages.has(packageName)
          const inMatchingFolder = [...matchingFolderIds].some(folderId => {
            // folderId format is "packageName:/examples/path/"
            const [folderPkg, folderPath] = folderId.split(':')
            return packageName === folderPkg && configPath.startsWith(folderPath)
          })
          item.style.display = itemMatches || inMatchingPackage || inMatchingFolder ? '' : 'none'
        })

        // Show/hide folders based on whether they match or have visible children
        folders.forEach(folder => {
          const folderId = folder.dataset.folderId
          const folderMatches = matchingFolderIds.has(folderId)
          const contents = folder.nextElementSibling
          const hasVisibleChildren = contents?.querySelector('.dev-sidebar-item:not([style*="display: none"])')
          folder.style.display = folderMatches || hasVisibleChildren ? '' : 'none'
          if (folderMatches || hasVisibleChildren) {
            folder.classList.add('open')
          }
        })

        // Show/hide packages based on whether they match or have visible children
        packageFolders.forEach(pkg => {
          const packageName = pkg.dataset.package
          const packageMatches = matchingPackages.has(packageName)
          const contents = pkg.nextElementSibling
          const hasVisibleChildren = contents?.querySelector('.dev-sidebar-item:not([style*="display: none"])')
          pkg.style.display = packageMatches || hasVisibleChildren ? '' : 'none'
          if (packageMatches || hasVisibleChildren) {
            pkg.classList.add('open')
          }
        })
      }

      searchInput.addEventListener('input', applySearchFilter)

      // Editor toggle handler
      editorToggle.addEventListener('click', () => {
        editorMode = !editorMode
        editorToggle.classList.toggle('active', editorMode)

        // Update URL
        const url = new URL(window.location)
        if (editorMode) {
          url.searchParams.set('editor', 'true')
        } else {
          url.searchParams.delete('editor')
        }
        history.pushState({}, '', url.toString().replace(/%2F/g, '/'))

        // Reload iframe with new editor state
        if (currentSelection) {
          const port = packages[currentSelection.packageName]
          const editorParam = editorMode ? '&editor=true' : ''
          main.innerHTML = `<iframe src="http://localhost:${port}?config=${currentSelection.configPath}&sidebar=false${editorParam}"></iframe>`
        }
      })

      // Fetch examples for a single package
      async function fetchPackageExamples(packageName) {
        const port = packages[packageName]
        try {
          const response = await fetch(`http://localhost:${port}/__examples`)
          const examples = await response.json()
          return { online: true, examples }
        } catch (err) {
          return { online: false, examples: null }
        }
      }

      // Update a single package's display in the sidebar
      async function updatePackageStatus(packageName) {
        const { online, examples } = await fetchPackageExamples(packageName)
        const wasOnline = packageStatus[packageName]
        packageStatus[packageName] = online

        if (online) {
          packageData[packageName] = examples
        }

        // If status changed, rebuild sidebar
        if (online !== wasOnline) {
          rebuildSidebar()

          // If the URL-requested package just came online, load it
          if (online && packageName === urlPackage && urlConfig && !currentSelection) {
            loadConfig(urlPackage, urlConfig, true)
          }
          // Otherwise, if default package came online and nothing selected, use default
          else if (online && packageName === DEFAULT_PACKAGE && !currentSelection) {
            loadConfig(DEFAULT_PACKAGE, DEFAULT_CONFIG, true)
          }
        }
      }

      // Rebuild entire sidebar from cached data
      function rebuildSidebar() {
        let html = ''
        for (const packageName of Object.keys(packages)) {
          html += renderPackage(packageName, packageStatus[packageName], packageData[packageName])
        }
        sidebarTree.innerHTML = html
        attachHandlers()
        applySearchFilter()
      }

      // Initial load - fetch all packages
      async function initSidebar() {
        // Fetch all packages in parallel
        await Promise.all(
          Object.keys(packages).map(async packageName => {
            const { online, examples } = await fetchPackageExamples(packageName)
            packageStatus[packageName] = online
            if (online) {
              packageData[packageName] = examples
            }
          })
        )

        rebuildSidebar()

        // Check URL params for initial selection (shareable links)
        if (urlPackage && urlConfig && packageStatus[urlPackage]) {
          // URL has package and config - restore that selection
          loadConfig(urlPackage, urlConfig, true) // skip URL update since we're loading from URL
        } else if (packageStatus[DEFAULT_PACKAGE]) {
          // No URL params or package offline - use default (skip URL update to keep URL clean)
          loadConfig(DEFAULT_PACKAGE, DEFAULT_CONFIG, true)
        }

        // Start polling for offline packages
        startPolling()
      }

      // Poll offline packages every 2 seconds
      function startPolling() {
        setInterval(() => {
          for (const packageName of Object.keys(packages)) {
            if (!packageStatus[packageName]) {
              updatePackageStatus(packageName)
            }
          }
        }, 1000)
      }

      // Handle browser back/forward navigation
      window.addEventListener('popstate', event => {
        if (event.state?.packageName && event.state?.configPath) {
          // Load the config from history state (skip URL update since we're navigating)
          if (packageStatus[event.state.packageName]) {
            loadConfig(event.state.packageName, event.state.configPath, true)
          }
        }
      })

      // Initialize
      initSidebar()
    </script>
  </body>
</html>
