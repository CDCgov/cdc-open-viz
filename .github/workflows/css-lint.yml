name: CSS Linting

on:
  pull_request:
    paths:
      - "packages/**/*.css"
      - ".stylelintrc.json"
      - ".github/workflows/css-lint.yml"
  push:
    branches:
      - main
      - dev
    paths:
      - "packages/**/*.css"
      - ".stylelintrc.json"

jobs:
  stylelint:
    runs-on: ubuntu-latest
    name: Lint CSS Files

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run stylelint
        run: yarn lint:css
