name: Config Documentation Review Comment

on:
  pull_request_target:
    branches: [dev, test]
    types: [opened, synchronize, reopened, edited]

jobs:
  comment-config-doc-review:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Review config doc maintenance signals
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const prNumber = context.payload.pull_request.number
            const marker = '<!-- config-doc-review-comment -->'

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: prNumber,
              per_page: 100
            })

            const changed = files.map(file => file.filename)
            const packageNames = ['data-bite', 'chart', 'dashboard', 'data-table', 'map', 'markup-include', 'waffle-chart']

            const packageSignals = new Map()

            const ensureSignal = pkg => {
              if (!packageSignals.has(pkg)) {
                packageSignals.set(pkg, {
                  configCodeChanged: [],
                  packageDocsChanged: false
                })
              }
              return packageSignals.get(pkg)
            }

            const configCodePatterns = [
              /^\/src\/types?\//,
              /^\/types\//,
              /^\/src\/data\/initial-state\./,
              /^\/src\/data\/legacy-defaults\./,
              /migrat/i
            ]

            for (const file of changed) {
              for (const pkg of packageNames) {
                const pkgPrefix = `packages/${pkg}/`
                if (!file.startsWith(pkgPrefix)) continue

                const signal = ensureSignal(pkg)
                const relative = file.slice(pkgPrefix.length)

                if (
                  relative === 'CONFIG.md' ||
                  relative === 'README.md' ||
                  relative === 'examples/minimal-example.json'
                ) {
                  signal.packageDocsChanged = true
                }

                if (configCodePatterns.some(pattern => pattern.test(`/${relative}`))) {
                  signal.configCodeChanged.push(file)
                }
              }
            }

            const coreConfigChanged = changed.includes('packages/core/CONFIG.md')
            const coreSharedCodeChanged = changed.some(file =>
              file.startsWith('packages/core/types/') ||
              file.startsWith('packages/core/components/DataTable/types/') ||
              /packages\/core\/.*migrat/i.test(file)
            )

            const flaggedPackages = [...packageSignals.entries()]
              .filter(([, signal]) => signal.configCodeChanged.length > 0 && !signal.packageDocsChanged && !coreConfigChanged)

            const messages = []

            for (const [pkg, signal] of flaggedPackages) {
              messages.push(
                `- \`packages/${pkg}\`: config-related code changed, but no matching \`README.md\`, \`CONFIG.md\`, or \`examples/minimal-example.json\` update was detected.`
              )
            }

            if (coreSharedCodeChanged && !coreConfigChanged) {
              messages.push(
                '- `packages/core`: shared config-related code changed, but `packages/core/CONFIG.md` was not updated.'
              )
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100
            })

            const existing = comments.find(comment =>
              comment.user.type === 'Bot' && comment.body && comment.body.includes(marker)
            )

            if (messages.length === 0) {
              if (existing) {
                await github.rest.issues.deleteComment({
                  owner,
                  repo,
                  comment_id: existing.id
                })
              }
              core.info('No config documentation follow-up comment needed.')
              return
            }

            const body = [
              marker,
              'Config documentation review may be needed for this PR.',
              '',
              ...messages,
              '',
              'This check is advisory. If the config contract did not change, no docs update may be needed. If consumer-facing config behavior did change, please review the package `CONFIG.md` and shared `packages/core/CONFIG.md` as appropriate.'
            ].join('\n')

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              })
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body
              })
            }
